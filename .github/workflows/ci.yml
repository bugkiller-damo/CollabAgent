name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collabagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/collabagent_test
      JWT_SECRET: ci-test-secret
      REFRESH_SECRET: ci-test-refresh-secret
      PORT: "3001"
      BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Run DB migrations
        run: pnpm --filter @collabagent/server run db:migrate

      - name: Start server
        run: |
          pnpm --filter @collabagent/server exec tsx src/index.ts &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health >/dev/null; then
              echo "server up"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/api/health || (echo "server failed to start" && exit 1)

      - name: Run server tests
        run: pnpm --filter @collabagent/server run test

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" || true
